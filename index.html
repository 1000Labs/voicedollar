<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; color: #f3f4f6; }
        .glass-card { background: #0d111a; border: 1px solid #1f2937; border-radius: 1.5rem; }
        .input-box { background: #1a1f2e; border: 1px solid #374151; color: white; }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
    </style>
</head>
<body class="p-5 flex items-center justify-center min-h-screen">
    <div class="max-w-xl w-full glass-card p-10 shadow-2xl">
        <h1 class="text-4xl font-extrabold text-blue-500 text-center mb-10">VoiceDollar.ai</h1>
        <textarea id="textInput" class="w-full p-5 input-box rounded-xl mb-6" rows="5" placeholder="Kuch likho..."></textarea>
        <button onclick="generateVoice()" id="btn" class="w-full btn-premium p-5 rounded-xl font-bold">Generate Voice</button>
        <audio id="audioPlayer" controls class="hidden w-full mt-8"></audio>
    </div>

    <script>
        async function generateVoice() {
            const text = document.getElementById('textInput').value;
            if(!text) return;
            const btn = document.getElementById('btn');
            const player = document.getElementById('audioPlayer');
            btn.innerHTML = "Processing...";
            btn.disabled = true;

            try {
                // Ye direct fetch kar raha hai taaki vercel.json ka lafda na ho
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/mms-tts-eng", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": "Bearer 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" // Tera naya token
                    },
                    body: JSON.stringify({ inputs: text }),
                });

                const result = await response.blob();
                if (result.type.includes("audio")) {
                    player.src = URL.createObjectURL(result);
                    player.classList.remove('hidden');
                    player.play();
                } else {
                    alert("Model load ho raha hai, 10 second baad dobara try karo.");
                }
            } catch (err) {
                alert("Connection error!");
            } finally {
                btn.innerHTML = "Generate Voice";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
