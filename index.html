<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: sans-serif; }
        .glass-card { background: #0d111a; border: 1px solid #1f2937; border-radius: 1.5rem; }
        .input-box { background: #1a1f2e; border: 1px solid #374151; color: white; }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
    </style>
</head>
<body class="p-5 flex items-center justify-center min-h-screen">
    <div class="max-w-xl w-full glass-card p-10 shadow-2xl">
        <h1 class="text-4xl font-extrabold text-blue-500 text-center mb-10 tracking-tighter">VoiceDollar.ai</h1>
        <textarea id="textInput" class="w-full p-5 input-box rounded-xl focus:outline-none mb-6" rows="6" placeholder="Yahan text likho..."></textarea>
        <button onclick="generateVoice()" id="btn" class="w-full btn-premium p-5 rounded-xl font-bold shadow-lg transform active:scale-95 transition-all">Generate Voice</button>
        <audio id="audioPlayer" controls class="hidden w-full mt-8 rounded-full border border-slate-700"></audio>
    </div>
    <script>
        async function generateVoice() {
            const text = document.getElementById('textInput').value;
            if(!text) return;
            const btn = document.getElementById('btn');
            const player = document.getElementById('audioPlayer');
            btn.disabled = true;
            btn.innerHTML = "Processing...";
            try {
                // Ye seedha Vercel ke backend (/api/generate) ko hit karega
                const response = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: text }),
                });
                if(!response.ok) throw new Error();
                const result = await response.blob();
                player.src = URL.createObjectURL(result);
                player.classList.remove('hidden');
                player.play();
            } catch (err) {
                alert("Model load ho raha hai, 10 second baad try karein.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Generate Voice";
            }
        }
    </script>
</body>
</html>
