<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar AI - $1 Voice Cloning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-premium { background: linear-gradient(90deg, #4f46e5, #9333ea); }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
            VoiceDollar.ai
        </h1>
        <div class="px-3 py-1 glass rounded-full text-xs font-semibold">Global Beta</div>
    </div>

    <div class="glass rounded-2xl p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-400 mb-4 uppercase tracking-widest">Step 1: Clone Your Voice</h2>
        <div class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center flex flex-col items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
            <p class="text-sm text-gray-300">Upload or Record 10s Audio</p>
        </div>
    </div>

    <div class="glass rounded-2xl p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-400 mb-4 uppercase tracking-widest">Step 2: Enter Text</h2>
        <textarea class="w-full bg-transparent border border-gray-700 rounded-xl p-4 text-sm focus:outline-none focus:border-blue-500" rows="4" placeholder="What should your AI voice say?"></textarea>
    </div>

    <div class="space-y-4">
        <button class="w-full btn-premium py-4 rounded-xl font-bold text-lg shadow-lg transform active:scale-95 transition">
            Generate with Pro <span class="text-xs font-normal opacity-80">($1/mo)</span>
        </button>
        
        <button class="w-full glass py-4 rounded-xl font-semibold text-gray-300 text-sm flex items-center justify-center space-x-2">
            <span>Watch Ad to Generate Free</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
            </svg>
        </button>
    </div>

    <p class="text-center text-xs text-gray-500 mt-10">Trusted by 50,000+ Global Creators. <br> Powered by High-Speed AI Servers.</p>

</body>
</html>
