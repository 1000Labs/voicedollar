<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai - ₹29 AI Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #030712 0%, #1a1f2e 100%); color: #f3f4f6; font-family: sans-serif; }
        .glass-card { background: rgba(13, 17, 26, 0.8); border: 1px solid #1f2937; border-radius: 2rem; backdrop-filter: blur(10px); }
        .input-box { background: #1a1f2e; border: 1px solid #374151; color: white; width: 100%; padding: 1.5rem; border-radius: 1rem; margin-bottom: 1rem; }
        .btn-premium { background: linear-gradient(135deg, #2563eb, #1d4ed8); width: 100%; padding: 1.25rem; border-radius: 1rem; font-weight: bold; color: white; border: none; cursor: pointer; }
        .btn-buy { background: linear-gradient(135deg, #10b981, #059669) !important; }
        .btn-premium:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 gap-6">
    
    <!-- MAIN APP -->
    <div class="max-w-lg w-full glass-card p-8 text-center shadow-2xl">
        <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent mb-4">🎙️ VoiceDollar.ai</h1>
        <p class="text-gray-300 mb-6">11 Labs jaisa voice generator - Sirf ₹29!</p>
        
        <textarea id="txt" class="input-box text-lg" rows="4" placeholder="Yahan text likho...">Namaste doston, VoiceDollar.ai ka magic test karo!</textarea>
        
        <button onclick="generateVoice()" id="btn" class="btn-premium text-lg py-4">🎵 Generate Voice (FREE)</button>
        
        <div id="status" class="mt-4 p-3 rounded-lg font-semibold hidden"></div>
        <audio id="player" controls class="w-full mt-4 rounded-lg hidden"></audio>
    </div>

    <!-- PRICING -->
    <div class="max-w-md w-full glass-card p-6 text-center">
        <div class="text-3xl font-black text-green-400 mb-4">₹29<span class="text-lg">/month</span></div>
        <p class="text-gray-300 mb-4">✅ Unlimited voices • No watermark • MP3 download</p>
        <a href="https://wa.me/91YOURNUMBER?text=*VoiceDollar.ai*+%E2%82%B929+plan+chahiye!+UPI+link+bhejdo" 
           class="block btn-premium btn-buy text-lg py-3 mb-2" target="_blank">
           💰 Buy Now (WhatsApp)
        </a>
        <p class="text-xs text-gray-400">UPI • PhonePe • Instant access</p>
    </div>

    <script>
        let usesLeft = 3;

        function generateVoice() {
            const text = document.getElementById('txt').value.trim();
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const player = document.getElementById('player');

            if (!text) {
                alert('Text daalo bhai!');
                return;
            }

            if (usesLeft <= 0) {
                alert('Free limit khatam! ₹29 me unlimited lo!');
                return;
            }

            // BUTTON DISABLE + LOADING
            btn.disabled = true;
            btn.innerHTML = '🔊 Speaking...';
            status.classList.remove('hidden');
            status.innerHTML = '🎙️ Voice generate ho rahi...';
            status.className = 'bg-blue-500/30 p-3 rounded-lg';

            // BROWSER BUILT-IN VOICE (100% WORKING EVERYWHERE)
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';  // English voice
            utterance.rate = 0.9;      // Natural speed
            utterance.pitch = 1;       // Normal pitch
            utterance.volume = 1;

            utterance.onstart = () => {
                status.innerHTML = '✅ Voice chal rahi hai!';
                status.className = 'bg-green-500/30 p-3 rounded-lg';
            };

            utterance.onend = () => {
                status.innerHTML = `🎉 Success! ${usesLeft-1} free uses bache. ₹29 me unlimited!`;
                btn.disabled = false;
                btn.innerHTML = '🎵 New Voice';
                usesLeft--;
                
                // Show download option
                player.classList.remove('hidden');
            };

            speechSynthesis.speak(utterance);
        }

        // Allow manual stop/restart
        document.getElementById('player').addEventListener('play', () => {
            document.getElementById('status').innerHTML = '🔄 Voice replaying...';
        });
    </script>
</body>
</html>
