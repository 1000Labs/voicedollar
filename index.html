<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        if(!text) return alert("Please enter text!");
        document.getElementById('status').classList.remove('hidden');
        
        try {
            // Isme humne token ko poori tarah mita diya hai
            const response = await fetch("https://api-inference.huggingface.co/models/facebook/mms-tts-eng", {
                headers: { 
                    Authorization: "Bearer " + "REPLACE_WITH_VARIABLE" 
                },
                method: "POST",
                body: JSON.stringify({ inputs: text }),
            });

            if (!response.ok) throw new Error("Server Busy");

            const result = await response.blob();
            const player = document.getElementById('audioPlayer');
            player.src = URL.createObjectURL(result);
            player.classList.remove('hidden');
            player.play();
        } catch (err) { 
            alert("Security Blocked. Use Vercel Settings."); 
        } finally { 
            document.getElementById('status').classList.add('hidden'); 
        }
    }
</script>
