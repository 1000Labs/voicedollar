        <div id="status" class="text-center text-sm mb-4"></div>
    </div>

            const voices = speechSynthesis.getVoices();
            document.getElementById('status').innerHTML = `✅ ${voices.length} voices loaded!`;
            voicesLoaded = true;
        }
