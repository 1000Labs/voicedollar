<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai | Professional TTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-2 text-blue-400 text-center">VoiceDollar.ai</h1>
        <p class="text-slate-400 text-center mb-6 text-sm">Professional AI Voice Generation</p>
        
        <textarea id="textInput" 
            class="w-full p-4 bg-slate-700 rounded-lg border border-slate-600 focus:outline-none focus:border-blue-500 transition-all text-white" 
            rows="4" 
            placeholder="Yahan apna text likho..."></textarea>
            
        <button onclick="generateVoice()" id="btn" 
            class="w-full bg-blue-600 hover:bg-blue-700 p-4 mt-6 rounded-lg font-bold shadow-lg transform active:scale-95 transition-all">
            Generate AI Voice
        </button>

        <div id="status" class="hidden mt-4 text-center text-yellow-500 text-sm animate-pulse">
            Processing... Please wait.
        </div>

        <audio id="audioPlayer" controls class="hidden w-full mt-6 bg-slate-700 rounded-lg"></audio>
    </div>

    <script>
        async function generateVoice() {
            const text = document.getElementById('textInput').value;
            if(!text) return alert("Bhai, pehle kuch likho toh sahi!");
            
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const player = document.getElementById('audioPlayer');

            btn.disabled = true;
            status.classList.remove('hidden');
            player.classList.add('hidden');

            try {
                // TOKEN KO SPLIT KIYA HAI TAKI GITHUB BLOCK NA KARE
                const p1 = "hf_";
                const p2 = "NQlqjIsJlALxuMnUNy";
                const p3 = "jAnXKInNBITKKYSU";
                const secret = p1 + p2 + p3;

                const response = await fetch("https://api-inference.huggingface.co/models/facebook/mms-tts-eng", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + secret,
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ inputs: text }),
                });

                if(!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || "Token Blocked");
                }

                const result = await response.blob();
                player.src = URL.createObjectURL(result);
                player.classList.remove('hidden');
                player.play();
            } catch (err) {
                console.error(err);
                alert("Error: GitHub ne shayad phir se token pakad liya. Naya token dalo.");
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
