<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-6 text-blue-400 text-center">VoiceDollar.ai</h1>
        <textarea id="textInput" class="w-full p-4 bg-slate-700 rounded-lg border border-slate-600" rows="4"></textarea>
        <button onclick="generateVoice()" id="btn" class="w-full bg-blue-600 p-4 mt-6 rounded-lg font-bold">Generate</button>
        <audio id="audioPlayer" controls class="hidden w-full mt-6"></audio>
    </div>

    <script>
        async function generateVoice() {
            const text = document.getElementById('textInput').value;
            const btn = document.getElementById('btn');
            btn.disabled = true;

            try {
                const response = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: text }),
                });

                const result = await response.blob();
                const player = document.getElementById('audioPlayer');
                player.src = URL.createObjectURL(result);
                player.classList.remove('hidden');
                player.play();
            } catch (err) {
                alert("Error!");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
