<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">VoiceDollar.ai</h1>
        <textarea id="textInput" class="w-full p-3 bg-slate-800 rounded" placeholder="Type here..."></textarea>
        <button onclick="generateVoice()" class="w-full bg-blue-600 p-3 mt-4 rounded">Generate Voice</button>
        <audio id="audioPlayer" controls class="hidden w-full mt-4"></audio>
    </div>

    <script>
        async function generateVoice() {
            const text = document.getElementById('textInput').value;
            if(!text) return alert("Please enter text!");
            
            try {
                // YE CODE VERCEL KI SETTINGS SE TOKEN UTHAYEGA
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/mms-tts-eng", {
                    headers: { 
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                });

                const result = await response.blob();
                const player = document.getElementById('audioPlayer');
                player.src = URL.createObjectURL(result);
                player.classList.remove('hidden');
                player.play();
            } catch (err) { 
                alert("Check Vercel Settings."); 
            }
        }
    </script>
</body>
</html>
