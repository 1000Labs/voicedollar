<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDollar.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- RESPONSIVEVOICE FREE API -->
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: sans-serif; }
        .glass-card { background: rgba(13, 17, 26, 0.7); border: 1px solid #1f2937; border-radius: 1.5rem; }
        .input-box { background: #1a1f2e; border: 1px solid #374151; color: white; width: 100%; padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem; outline: none; }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); width: 100%; padding: 1.25rem; border-radius: 0.75rem; font-weight: bold; color: white; transition: 0.2s; }
        .btn-premium:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-xl w-full glass-card p-10 text-center shadow-2xl">
        <h1 class="text-4xl font-extrabold text-blue-500 mb-10 tracking-tighter">VoiceDollar.ai</h1>
        <textarea id="txt" class="input-box text-lg" rows="5" placeholder="Enter text...">Namaste doston, VoiceDollar.ai ka magic dekho!</textarea>
        <button onclick="generateVoice()" id="btn" class="btn-premium">🎙️ Generate Voice (FREE)</button>
        <p id="status" class="mt-4 text-sm text-gray-400">Click generate - Instant voice!</p>
        <audio id="player" controls class="hidden w-full mt-10"></audio>
        
        <!-- ₹29 PAYMENT BUTTON -->
        <div class="mt-8 p-6 glass-card text-left">
            <h2 class="text-2xl font-bold mb-4 text-green-400">💰 Unlimited Plan</h2>
            <div class="text-3xl font-black text-green-500 mb-2">₹29/month</div>
            <a href="https://wa.me/91XXXXXXXXX?text=Hi,%20VoiceDollar.ai%20₹29%20plan%20chahiye.%20UPI%20link%20bhej%20do!" 
               class="block btn-premium mb-2" target="_blank" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
               🚀 Buy ₹29 Now (WhatsApp)
            </a>
            <p class="text-xs text-gray-500">✅ UPI accepted • Instant access • No limits</p>
        </div>
    </div>

    <script>
        async function generateVoice() {
            const text = document.getElementById('txt').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            if(!text) {
                status.innerHTML = "❌ Text enter karo!";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "🎙️ Speaking...";
            status.innerHTML = "Voice generating...";

            try {
                // METHOD 1: ResponsiveVoice (INSTANT 100% WORKING)
                responsiveVoice.speak(text, "US English Male", {
                    rate: 0.9,
                    pitch: 1,
                    onstart: () => status.innerHTML = "✅ Speaking now!",
                    onend: () => {
                        status.innerHTML = "🎉 Success! ₹29 me unlimited access lo!";
                        btn.disabled = false;
                        btn.innerHTML = "🎙️ New Voice";
                    }
                });

            } catch(e) {
                // METHOD 2: Browser fallback
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
                status.innerHTML = "✅ Voice ready!";
            }
        }
    </script>
</body>
</html>
